<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrig Logo</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    img {
      max-width: 90%;
      max-height: 75vh;
      object-fit: contain;
    }

    .company-name {
      margin-top: 20px;
      font-size: 28px;
      font-weight: 600;
      color: #000;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="67a4c2af-fb61-49de-9a3d-75d277c301ec.jpg" alt="Wrig Logo" />
    <div class="company-name">Wrig Nanosystems Private Limited</div>
  </div>
</body>
</html>
